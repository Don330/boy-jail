version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      aws-amplify:
        patterns:
          - "aws-amplify*"
          - "@aws-amplify*"
      next:
        patterns:
          - "next"
          - "react"
          - "react-dom"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
